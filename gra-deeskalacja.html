/* ─── API ─── */
// Proxy (Cloudflare Worker) nie obsługuje osobnego pola "system" —
// kontekst jest wbudowywany bezpośrednio w pierwszą wiadomość user.
async function callClaude(apiKey, messages, maxTokens = 350) {
  let rawText = '';
  const res = await fetch(PROXY, {
    method: "POST",
    headers: {"Content-Type": "application/json", "x-api-key": apiKey},
    body: JSON.stringify({model: "claude-haiku-4-5-20251001", max_tokens: maxTokens, messages})
  });
  rawText = await res.text();
  if (!res.ok) throw new Error(`HTTP ${res.status}: ${rawText.slice(0, 200)}`);
  let data;
  try { data = JSON.parse(rawText); } catch(e) { throw new Error(`Nie-JSON: ${rawText.slice(0, 200)}`); }
  if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));
  const text = (data.content || []).map(b => b.text || '').join('');
  if (!text) throw new Error(`Pusta odpowiedź. Surowa: ${rawText.slice(0, 200)}`);
  return text;
}

function parseJSON(text) {
  // Szukamy od pierwszego { do ostatniego } — obsługuje zagnieżdżone obiekty
  const start = text.indexOf('{');
  const end = text.lastIndexOf('}');
  if (start === -1 || end === -1) throw new Error(`Brak JSON w odpowiedzi: ${text.slice(0, 150)}`);
  return JSON.parse(text.slice(start, end + 1));
}

async function fetchTeenResponse(apiKey, scenario, history, currentEmotion) {
  const context = `TWOJA ROLA: ${scenario.context}

TWÓJ AKTUALNY POZIOM EMOCJONALNY: ${currentEmotion}/10
(10 = maksymalnie rozregulowany, 1 = spokojny)

ZASADY GRY:
- Odpowiadaj WYŁĄCZNIE jako ${scenario.teenName}. Nigdy nie wychodź z roli.
- Jeśli dorosły waliduje emocje / słucha / daje przestrzeń → nowyPoziom spada o 1-2
- Jeśli dorosły minimalizuje, moralizuje, naciska lub daje rady → nowyPoziom rośnie o 1-2
- Odpowiedzi KRÓTKIE (1-4 zdania) — nastolatkowie nie wygłaszają mów gdy są wzburzeni
- Odpowiadaj po polsku
- Zwróć TYLKO JSON (i nic innego):
  {"odpowiedz":"...","nowyPoziom":X,"mysl":"krótka wewnętrzna myśl nastolatka"}
- nowyPoziom: liczba całkowita 1-10

WIADOMOŚĆ DO CIEBIE:
`;

  // Wbudowujemy kontekst w pierwszą wiadomość user (proxy nie obsługuje "system")
  const withCtx = history.map((m, i) =>
    i === 0 ? {...m, content: context + m.content} : m
  );

  const raw = await callClaude(apiKey, withCtx, 300);
  return parseJSON(raw);
}

async function fetchSupervisorFeedback(apiKey, adultMessages) {
  const content = `Jesteś ekspertem od komunikacji z nastolatkami i technik deeskalacji (NVC, podejście trauma-informowane).

Oceń poniższe wiadomości dorosłego do przebodźcowanego nastolatka:
${adultMessages.map((m, i) => `${i + 1}. "${m}"`).join('\n')}

Kryteria: walidacja emocji, aktywne słuchanie, spokojny ton, pytania otwarte, szanowanie granic i tempa.

Zwróć TYLKO JSON (i nic innego):
{"ocena":"dobra","komentarz":"2-3 zdania oceny","wskazowka":"jedna konkretna wskazówka na następną wiadomość"}
Pole "ocena" może mieć wartość: "dobra", "ok" lub "wymaga_pracy".`;

  const raw = await callClaude(apiKey, [{role: "user", content}], 400);
  return parseJSON(raw);
}

/* ─── GAME SCREEN ─── */
function GameScreen({scenario, apiKey, onEnd}) {
  const [messages, setMessages] = useState([]);
  const [emotion, setEmotion] = useState(scenario.startEmotion);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const [adultCount, setAdultCount] = useState(0);
  const [ended, setEnded] = useState(false);
  const [error, setError] = useState('');
  const bottomRef = useRef(null);
  const inputRef = useRef(null);
  const msgsRef = useRef(messages);
  const emotionRef = useRef(emotion);
  const adultCountRef = useRef(adultCount);
  msgsRef.current = messages;
  emotionRef.current = emotion;
  adultCountRef.current = adultCount;

  useEffect(() => {
    bottomRef.current?.scrollIntoView({behavior: 'smooth'});
  }, [messages, loading]);

  const sendMessage = useCallback(async () => {
    const text = input.trim();
    if (!text || loading || ended) return;
    setInput('');
    setError('');

    const prevMsgs = msgsRef.current;
    const prevEmotion = emotionRef.current;
    const prevAdultCount = adultCountRef.current;
    const newAdultCount = prevAdultCount + 1;
    setAdultCount(newAdultCount);

    const withAdult = [...prevMsgs, {role: 'adult', text}];
    setMessages(withAdult);
    setLoading(true);

    try {
      // Build conversation history for Claude (only teen/adult turns)
      const history = withAdult
        .filter(m => m.role === 'teen' || m.role === 'adult')
        .map(m => ({role: m.role === 'teen' ? 'assistant' : 'user', content: m.text}));

      // Get teen response
      const teenResp = await fetchTeenResponse(apiKey, scenario, history, prevEmotion);
      const newEmotion = Math.max(1, Math.min(10, Math.round(teenResp.nowyPoziom)));

      let updated = [...withAdult, {
        role: 'teen',
        text: teenResp.odpowiedz || '...',
        emotion: newEmotion,
        mysl: teenResp.mysl
      }];

      setEmotion(newEmotion);

      // Supervisor feedback every 3 adult messages
      if (newAdultCount % 3 === 0) {
        const lastThree = withAdult
          .filter(m => m.role === 'adult')
          .slice(-3)
          .map(m => m.text);
        try {
          const sup = await fetchSupervisorFeedback(apiKey, lastThree);
          updated = [...updated, {
            role: 'supervisor',
            rating: sup.ocena,
            komentarz: sup.komentarz,
            wskazowka: sup.wskazowka,
            round: Math.floor(newAdultCount / 3)
          }];
        } catch (supErr) {
          // Supervisor failed silently — game continues
        }
      }

      setMessages(updated);

      // End conditions
      if (newEmotion <= 2 || newAdultCount >= 15) {
        setEnded(true);
      }
    } catch (err) {
      setError(`Błąd API: ${err.message}. Sprawdź klucz i spróbuj ponownie.`);
      setAdultCount(prevAdultCount); // revert count on error
      setMessages(prevMsgs); // revert messages on error
    } finally {
      setLoading(false);
      if (!ended) inputRef.current?.focus();
    }
  }, [input, loading, ended, apiKey, scenario]);

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  const msgsUntilSupervisor = 3 - (adultCount % 3);
  const supervisorMsgs = messages.filter(m => m.role === 'supervisor');
  const goodCount = supervisorMsgs.filter(m => m.rating === 'dobra').length;
  const lastEmotion = messages.filter(m => m.role === 'teen' && m.emotion).slice(-1)[0]?.emotion ?? scenario.startEmotion;

  return (
    <div style={{
      maxWidth: 640, margin: '0 auto',
      display: 'flex', flexDirection: 'column',
      height: 'calc(100vh - 52px)'
    }}>
      {/* ── HEADER ── */}
      <div style={{
        background: '#1a1a22', borderBottom: '1px solid #2e2e3e',
        padding: '10px 16px', flexShrink: 0
      }}>
        <div style={{display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 8}}>
          <div style={{display: 'flex', alignItems: 'center', gap: 10}}>
            <span style={{fontSize: 26}}>{scenario.emoji}</span>
            <div>
              <div style={{fontSize: 14, fontWeight: 700, color: scenario.color}}>{scenario.title}</div>
              <div style={{fontSize: 11, color: '#7070a0'}}>
                {scenario.subtitle} · {adultCount}/15 wiadomości
              </div>
            </div>
          </div>
          {ended && (
            <button
              onClick={() => onEnd({messages, emotion: lastEmotion, adultCount, goodCount, supervisorCount: supervisorMsgs.length})}
              className="btn-hover"
              style={{
                background: '#22c55e', color: '#000', border: 'none',
                borderRadius: 8, padding: '7px 14px',
                fontSize: 12, fontWeight: 700, cursor: 'pointer', transition: 'all .2s'
              }}
            >
              Podsumowanie →
            </button>
          )}
        </div>
        {/* Emotion bar */}
        <div>
          <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 4}}>
            <span style={{fontSize: 10, color: '#7070a0', textTransform: 'uppercase', letterSpacing: '0.07em', fontWeight: 600}}>
              Stan emocjonalny — {scenario.teenName}
            </span>
            <span style={{fontSize: 11, fontWeight: 700, color: emotionColor(lastEmotion)}}>
              {emotionLabel(lastEmotion)}
            </span>
          </div>
          <div style={{height: 5, background: '#2e2e3e', borderRadius: 999, overflow: 'hidden'}}>
            <div style={{
              height: '100%', width: `${lastEmotion * 10}%`,
              background: emotionColor(lastEmotion),
              borderRadius: 999, transition: 'all 0.6s ease'
            }}/>
          </div>
        </div>
      </div>

      {/* ── MESSAGES ── */}
      <div style={{flex: 1, overflowY: 'auto', padding: '16px', display: 'flex', flexDirection: 'column', gap: 10}}>

        {/* Scenario intro */}
        <div className="msg-in" style={{
          background: '#1a1a22',
          border: `1px solid ${scenario.color}40`,
          borderRadius: 14, padding: '14px 16px'
        }}>
          <div style={{fontSize: 11, fontWeight: 700, color: scenario.color, marginBottom: 8, textTransform: 'uppercase', letterSpacing: '0.07em'}}>
            📍 SYTUACJA WYJŚCIOWA
          </div>
          <p style={{fontSize: 13, color: '#c0c0d8', lineHeight: 1.7}}>{scenario.opis}</p>
          <div style={{
            marginTop: 12, padding: '8px 12px',
            background: 'rgba(255,255,255,0.04)', borderRadius: 8,
            fontSize: 12, color: '#7070a0'
          }}>
            💬 <strong style={{color: '#9090b0'}}>Twoja rola:</strong> Jesteś dorosłym, który wchodzi do pomieszczenia i próbuje nawiązać kontakt. Wpisz swoją pierwszą wiadomość poniżej.
          </div>
        </div>

        {messages.map((m, i) => {
          /* ADULT message */
          if (m.role === 'adult') return (
            <div key={i} className="msg-in" style={{display: 'flex', justifyContent: 'flex-end'}}>
              <div style={{maxWidth: '78%'}}>
                <div style={{fontSize: 10, color: '#7070a0', textAlign: 'right', marginBottom: 3, fontWeight: 600}}>
                  TY (dorosły)
                </div>
                <div style={{
                  background: '#1d4ed8',
                  borderRadius: '14px 14px 4px 14px',
                  padding: '10px 14px', fontSize: 14, lineHeight: 1.6
                }}>
                  {m.text}
                </div>
              </div>
            </div>
          );

          /* TEEN message */
          if (m.role === 'teen') return (
            <div key={i} className="msg-in" style={{display: 'flex', flexDirection: 'column', alignItems: 'flex-start', gap: 3}}>
              <div style={{fontSize: 10, color: '#7070a0', marginLeft: 2, fontWeight: 600}}>
                {scenario.subtitle.toUpperCase()}
              </div>
              <div style={{maxWidth: '78%'}}>
                <div style={{
                  background: '#22222e',
                  border: '1px solid #2e2e3e',
                  borderRadius: '4px 14px 14px 14px',
                  padding: '10px 14px', fontSize: 14, lineHeight: 1.6
                }}>
                  {m.text}
                </div>
                {m.emotion != null && (
                  <div style={{display: 'flex', alignItems: 'center', gap: 6, marginTop: 4, marginLeft: 2}}>
                    <div style={{width: 48, height: 3, background: '#2e2e3e', borderRadius: 999}}>
                      <div style={{
                        width: `${m.emotion * 10}%`, height: '100%',
                        background: emotionColor(m.emotion), borderRadius: 999
                      }}/>
                    </div>
                    <span style={{fontSize: 10, color: emotionColor(m.emotion), fontWeight: 600}}>
                      {m.emotion}/10
                    </span>
                    {m.mysl && (
                      <span style={{fontSize: 10, color: '#505070', fontStyle: 'italic'}}>
                        · „{m.mysl}"
                      </span>
                    )}
                  </div>
                )}
              </div>
            </div>
          );

          /* SUPERVISOR message */
          if (m.role === 'supervisor') {
            const st = ratingStyle(m.rating);
            return (
              <div key={i} className="msg-in" style={{
                background: st.bg,
                border: `1px solid ${st.border}40`,
                borderRadius: 14, padding: '14px 16px',
                margin: '4px 0'
              }}>
                <div style={{
                  display: 'flex', alignItems: 'center', gap: 8,
                  marginBottom: 10
                }}>
                  <span style={{fontSize: 18}}>🎓</span>
                  <span style={{fontSize: 11, fontWeight: 700, color: '#9090b0', textTransform: 'uppercase', letterSpacing: '0.07em'}}>
                    SUPERWIZOR — Runda {m.round}
                  </span>
                  <span style={{
                    fontSize: 11, fontWeight: 700,
                    background: `${st.border}25`,
                    color: st.text,
                    padding: '2px 8px', borderRadius: 999
                  }}>
                    {st.icon} {st.label}
                  </span>
                </div>
                <p style={{fontSize: 13, color: '#d0d0e0', lineHeight: 1.7, marginBottom: 10}}>
                  {m.komentarz}
                </p>
                <div style={{
                  background: 'rgba(255,255,255,0.05)',
                  borderRadius: 8, padding: '8px 12px',
                  display: 'flex', gap: 8, alignItems: 'flex-start'
                }}>
                  <span style={{fontSize: 16, flexShrink: 0}}>💡</span>
                  <div>
                    <span style={{fontSize: 10, fontWeight: 700, color: '#7070a0', textTransform: 'uppercase', letterSpacing: '0.05em'}}>
                      WSKAZÓWKA:{' '}
                    </span>
                    <span style={{fontSize: 13, color: '#e8e8f0', lineHeight: 1.6}}>{m.wskazowka}</span>
                  </div>
                </div>
              </div>
            );
          }
          return null;
        })}

        {/* Loading dots */}
        {loading && (
          <div style={{display: 'flex', alignItems: 'center', gap: 4, padding: '4px 0'}}>
            <span style={{fontSize: 10, color: '#7070a0', marginRight: 4}}>{scenario.teenName} pisze...</span>
            {[0, 1, 2].map(i => (
              <div key={i} style={{
                width: 5, height: 5, borderRadius: '50%',
                background: '#7070a0',
                animation: `bounce 1.2s ${i * 0.18}s infinite ease-in-out`
              }}/>
            ))}
          </div>
        )}

        {/* Error */}
        {error && (
          <div style={{
            background: 'rgba(239,68,68,0.1)', border: '1px solid #ef444440',
            borderRadius: 10, padding: '12px 14px', fontSize: 13, color: '#fca5a5',
            lineHeight: 1.5
          }}>
            ⚠ {error}
          </div>
        )}

        {/* End banners */}
        {ended && lastEmotion <= 2 && (
          <div className="msg-in" style={{
            background: 'rgba(34,197,94,0.1)', border: '1px solid #22c55e40',
            borderRadius: 14, padding: '20px', textAlign: 'center'
          }}>
            <div style={{fontSize: 40, marginBottom: 8}}>🏆</div>
            <div style={{fontWeight: 700, color: '#22c55e', fontSize: 16, marginBottom: 4}}>
              Udało się! {scenario.teenName} wyregulował/a się.
            </div>
            <div style={{fontSize: 13, color: '#9090b0'}}>
              Świetna robota — to efekt dobrej komunikacji.
            </div>
          </div>
        )}
        {ended && adultCount >= 15 && lastEmotion > 2 && (
          <div className="msg-in" style={{
            background: 'rgba(234,179,8,0.08)', border: '1px solid #eab30840',
            borderRadius: 14, padding: '20px', textAlign: 'center'
          }}>
            <div style={{fontSize: 40, marginBottom: 8}}>⏱️</div>
            <div style={{fontWeight: 700, color: '#eab308', fontSize: 16, marginBottom: 4}}>
              Sesja zakończona — limit 15 wiadomości
            </div>
            <div style={{fontSize: 13, color: '#9090b0'}}>
              Sprawdź wyniki i wskazówki w podsumowaniu.
            </div>
          </div>
        )}

        <div ref={bottomRef}/>
      </div>

      {/* ── INPUT ── */}
      {!ended ? (
        <div style={{
          flexShrink: 0, padding: '10px 14px',
          borderTop: '1px solid #2e2e3e',
          background: '#1a1a22'
        }}>
          <div style={{display: 'flex', gap: 8, marginBottom: 6}}>
            <textarea
              ref={inputRef}
              value={input}
              onChange={e => setInput(e.target.value)}
              onKeyDown={handleKey}
              placeholder={`Napisz do ${scenario.teenName}... (Enter = wyślij, Shift+Enter = nowa linia)`}
              disabled={loading}
              rows={2}
              style={{
                flex: 1, background: '#0f0f13',
                border: '1px solid #2e2e3e',
                borderRadius: 10, padding: '10px 12px',
                color: '#e8e8f0', fontSize: 14, outline: 'none',
                resize: 'none', lineHeight: 1.5
              }}
            />
            <button
              onClick={sendMessage}
              disabled={!input.trim() || loading}
              style={{
                width: 46, flexShrink: 0, border: 'none', borderRadius: 10,
                background: input.trim() && !loading ? '#1d4ed8' : '#22222e',
                color: input.trim() && !loading ? '#fff' : '#505070',
                fontSize: 20, cursor: input.trim() && !loading ? 'pointer' : 'not-allowed',
                transition: 'all .2s', display: 'flex', alignItems: 'center', justifyContent: 'center'
              }}
            >
              ↑
            </button>
          </div>
          <div style={{
            fontSize: 10, color: '#505070', textAlign: 'center',
            display: 'flex', justifyContent: 'space-between', alignItems: 'center'
          }}>
            <span>Wiadomość {adultCount}/15</span>
            <span>
              {msgsUntilSupervisor === 3 && adultCount > 0
                ? 'Superwizor po 3 wiadomościach'
                : `Superwizor za ${msgsUntilSupervisor} ${msgsUntilSupervisor === 1 ? 'wiadomość' : 'wiadomości'}`
              }
            </span>
          </div>
        </div>
      ) : (
        <div style={{
          flexShrink: 0, padding: '14px 16px',
          borderTop: '1px solid #2e2e3e',
          background: '#1a1a22', textAlign: 'center'
        }}>
          <button
            onClick={() => onEnd({messages, emotion: lastEmotion, adultCount, goodCount, supervisorCount: supervisorMsgs.length})}
            className="btn-hover"
            style={{
              background: '#1d4ed8', color: '#fff', border: 'none',
              borderRadius: 10, padding: '12px 40px',
              fontSize: 15, fontWeight: 600, cursor: 'pointer', transition: 'all .2s'
            }}
          >
            Zobacz podsumowanie →
          </button>
        </div>
      )}
    </div>
  );
}

/* ─── SUMMARY SCREEN ─── */
function SummaryScreen({data, scenario, onRestart, onNewScenario}) {
  const {messages, emotion, adultCount, goodCount, supervisorCount} = data;
  const finalEmotion = emotion;
  const drop = scenario.startEmotion - finalEmotion;
  const successPct = Math.max(0, Math.round((drop / scenario.startEmotion) * 100));
  const supervisorMsgs = messages.filter(m => m.role === 'supervisor');

  const trophy = finalEmotion <= 2 ? '🏆' : finalEmotion <= 4 ? '🥈' : finalEmotion <= 6 ? '📚' : '💪';
  const summaryText = finalEmotion <= 2
    ? 'Doskonale — nastolatek wyregulował się całkowicie!'
    : finalEmotion <= 4
    ? 'Dobra robota — widoczny postęp deeskalacji.'
    : finalEmotion <= 6
    ? 'Niezły start — jest jeszcze potencjał do poprawy.'
    : 'Trudna sesja — warto przejrzeć wskazówki Superwizora.';

  return (
    <div style={{maxWidth: 520, margin: '0 auto', padding: '32px 20px'}}>
      <div style={{textAlign: 'center', marginBottom: 28}}>
        <div style={{fontSize: 54, marginBottom: 10}}>{trophy}</div>
        <h1 style={{fontSize: 22, fontWeight: 700, marginBottom: 6}}>Sesja zakończona</h1>
        <p style={{color: '#9090b0', fontSize: 13}}>{scenario.title} · {scenario.subtitle}</p>
        <p style={{color: '#c0c0d8', fontSize: 14, marginTop: 8, fontWeight: 500}}>{summaryText}</p>
      </div>

      {/* Stats */}
      <div style={{background: '#1a1a22', border: '1px solid #2e2e3e', borderRadius: 16, padding: 20, marginBottom: 16}}>
        <div style={{display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 12, textAlign: 'center', marginBottom: 16}}>
          {[
            {val: `${finalEmotion}/10`, label: 'Końcowy poziom stresu', color: emotionColor(finalEmotion)},
            {val: adultCount, label: 'Wysłanych wiadomości', color: '#3b82ff'},
            {val: `${goodCount}/${supervisorCount}`, label: 'Dobrych ocen', color: '#22c55e'}
          ].map((s, i) => (
            <div key={i} style={{background: '#0f0f13', borderRadius: 10, padding: '12px 8px'}}>
              <div style={{fontSize: 22, fontWeight: 700, color: s.color}}>{s.val}</div>
              <div style={{fontSize: 10, color: '#7070a0', marginTop: 2, lineHeight: 1.4}}>{s.label}</div>
            </div>
          ))}
        </div>
        {/* Progress bar */}
        <div>
          <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 6}}>
            <span style={{fontSize: 11, color: '#7070a0', fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.06em'}}>
              Skuteczność deeskalacji
            </span>
            <span style={{fontSize: 16, fontWeight: 700, color: successPct >= 60 ? '#22c55e' : successPct >= 30 ? '#eab308' : '#ef4444'}}>
              {successPct}%
            </span>
          </div>
          <div style={{height: 8, background: '#2e2e3e', borderRadius: 999, overflow: 'hidden'}}>
            <div style={{
              height: '100%',
              width: `${successPct}%`,
              background: successPct >= 60 ? '#22c55e' : successPct >= 30 ? '#eab308' : '#ef4444',
              borderRadius: 999, transition: 'width 1s ease'
            }}/>
          </div>
        </div>
      </div>

      {/* Supervisor summary */}
      {supervisorMsgs.length > 0 && (
        <div style={{background: '#1a1a22', border: '1px solid #2e2e3e', borderRadius: 16, padding: 20, marginBottom: 16}}>
          <div style={{fontSize: 11, fontWeight: 700, color: '#7070a0', marginBottom: 16, textTransform: 'uppercase', letterSpacing: '0.07em'}}>
            🎓 Podsumowanie Superwizora
          </div>
          {supervisorMsgs.map((m, i) => {
            const st = ratingStyle(m.rating);
            return (
              <div key={i} style={{
                paddingBottom: i < supervisorMsgs.length - 1 ? 14 : 0,
                marginBottom: i < supervisorMsgs.length - 1 ? 14 : 0,
                borderBottom: i < supervisorMsgs.length - 1 ? '1px solid #2e2e3e' : 'none'
              }}>
                <div style={{display: 'flex', alignItems: 'center', gap: 6, marginBottom: 6}}>
                  <span style={{fontSize: 10, color: '#7070a0', fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.05em'}}>
                    Runda {m.round}
                  </span>
                  <span style={{fontSize: 11, color: st.text}}>{st.icon} {st.label}</span>
                </div>
                <p style={{fontSize: 13, color: '#c0c0d8', lineHeight: 1.6, marginBottom: 6}}>{m.komentarz}</p>
                <div style={{fontSize: 12, color: '#a0a0c0', fontStyle: 'italic', lineHeight: 1.5}}>
                  💡 {m.wskazowka}
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* Buttons */}
      <div style={{display: 'flex', gap: 10}}>
        <button
          onClick={onRestart}
          className="btn-hover"
          style={{
            flex: 1, background: '#1a1a22', border: '1px solid #2e2e3e',
            color: '#e8e8f0', borderRadius: 10, padding: '12px',
            fontSize: 14, fontWeight: 600, cursor: 'pointer', transition: 'all .2s'
          }}
        >
          🔄 Ten sam scenariusz
        </button>
        <button
          onClick={onNewScenario}
          className="btn-hover"
          style={{
            flex: 1, background: '#1d4ed8', border: 'none',
            color: '#fff', borderRadius: 10, padding: '12px',
            fontSize: 14, fontWeight: 600, cursor: 'pointer', transition: 'all .2s'
          }}
        >
          🎭 Nowy scenariusz
        </button>
      </div>
    </div>
  );
}

/* ─── ROOT APP ─── */
function App() {
  const [phase, setPhase] = useState('setup'); // setup | scenario | playing | summary
  const [apiKey, setApiKey] = useState(() => {
    try { return localStorage.getItem('deesc_apikey') || ''; } catch(e) { return ''; }
  });
  const [scenario, setScenario] = useState(null);
  const [summaryData, setSummaryData] = useState(null);
  const [gameKey, setGameKey] = useState(0); // force remount on restart

  return (
    <div style={{minHeight: 'calc(100vh - 52px)', background: '#0f0f13'}}>
      {phase === 'setup' && (
        <SetupScreen
          apiKey={apiKey}
          setApiKey={setApiKey}
          onNext={() => setPhase('scenario')}
        />
      )}
      {phase === 'scenario' && (
        <ScenarioScreen
          onSelect={s => { setScenario(s); setPhase('playing'); }}
          onBack={() => setPhase('setup')}
        />
      )}
      {phase === 'playing' && scenario && (
        <GameScreen
          key={gameKey}
          scenario={scenario}
          apiKey={apiKey}
          onEnd={data => { setSummaryData(data); setPhase('summary'); }}
        />
      )}
      {phase === 'summary' && summaryData && (
        <SummaryScreen
          data={summaryData}
          scenario={scenario}
          onRestart={() => { setGameKey(k => k + 1); setPhase('playing'); }}
          onNewScenario={() => setPhase('scenario')}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>

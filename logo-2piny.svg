<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Yellow background -->
  <rect width="200" height="200" fill="#DDFF00"/>

  <!-- Horizontal track line -->
  <line x1="10" y1="105" x2="175" y2="105" stroke="#111" stroke-width="4" stroke-linecap="round"/>
  <!-- Diagonal tail going down-right -->
  <line x1="155" y1="105" x2="185" y2="148" stroke="#111" stroke-width="4" stroke-linecap="round"/>
  <!-- End dot -->
  <circle cx="185" cy="150" r="6" fill="white" stroke="#111" stroke-width="3"/>

  <!-- "2P" text -->
  <text x="42" y="100" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="52" fill="#111" text-anchor="middle" letter-spacing="-2">2P</text>

  <!-- Traffic light icon replacing I -->
  <rect x="89" y="52" width="22" height="38" rx="4" ry="4" fill="#555"/>
  <circle cx="100" cy="65" r="7" fill="#222"/>
  <circle cx="100" cy="81" r="7" fill="#222"/>

  <!-- "NY" text -->
  <text x="100" y="148" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="52" fill="#111" text-anchor="middle" letter-spacing="-2">NY</text>

  <!-- "stowarzyszenie" text -->
  <text x="100" y="172" font-family="Arial, sans-serif" font-weight="400" font-size="13" fill="#111" text-anchor="middle" letter-spacing="1">stowarzyszenie</text>
</svg>
